<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add TODO - DailyDots</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="add-todo">
<header class="app-header">
    <div class="header-inner">
        <a class="brand" href="/">DailyDots TODO Tracker</a>
        <nav class="app-nav" aria-label="Primary navigation">
            <a href="/">Dashboard</a>
            <a href="/add-todo.html" aria-current="page">Add TODO</a>
            <a href="/todos.html">View TODOs</a>
            <a href="/history.html">Past & Completed</a>
        </nav>
    </div>
</header>

<main class="page-container">
    <section class="card">
        <h1>Add TODO</h1>
        <p>Create a new task with category, priority, and due date details.</p>
        <form id="todo-form" class="todo-form" novalidate>
            <div class="form-row">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" maxlength="255" required />
            </div>

            <div class="form-row">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" maxlength="2000"></textarea>
            </div>

            <div class="form-grid">
                <div class="form-row">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="PENDING" selected>Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" maxlength="120" />
                </div>

                <div class="form-row">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" name="dueDate" />
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-button">Create TODO</button>
                <a href="/todos.html" class="secondary-button">Cancel</a>
            </div>
            <p class="feedback-message" id="form-feedback" aria-live="polite"></p>
        </form>
    </section>
</main>

<script type="module" src="/js/app.js"></script>
</body>
</html>
